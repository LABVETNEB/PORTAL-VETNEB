services:
  - type: web
    name: portal-vetneb
    env: node
    plan: free
    buildCommand: pnpm install && pnpm build
    startCommand: pnpm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:./vetneb.db
      - key: OAUTH_SERVER_URL
        value: ""
      - key: APP_ID
        value: ""
      - key: COOKIE_SECRET
        value: "default-secret-key-change-in-production"
      - key: JWT_SECRET
        value: "default-jwt-secret-change-in-production"

